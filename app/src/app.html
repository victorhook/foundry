<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<!-- interactive-widget=overlays-content: the on-screen keyboard overlays the
		     page instead of resizing/reflowing it, so tapping a reps/weight field
		     doesn't shift the steppers and buttons under your finger. -->
		<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, interactive-widget=overlays-content" />
		<meta name="text-scale" content="scale" />
		<link rel="manifest" href="/manifest.webmanifest" />
		<link rel="icon" href="/icon.svg" type="image/svg+xml" />
		<link rel="apple-touch-icon" href="/icon.svg" />
		<meta name="theme-color" content="#14171C" />
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
		<meta name="apple-mobile-web-app-title" content="Foundry" />
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
