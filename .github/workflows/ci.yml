name: CI

on:
  push:
    branches: [main]
  pull_request:

defaults:
  run:
    working-directory: app

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run check

      - name: Unit tests
        run: npm run test:unit

      - name: Build
        run: npm run build

      # Cache the Playwright browser binaries so we don't re-download Chromium
      # (~100 MB) every run. Keyed on the lockfile — a Playwright version bump
      # changes the lock, which busts the cache and pulls the matching browser.
      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('app/package-lock.json') }}

      - name: Install Playwright browser
        # Cache hit: only (re)install the OS libraries — the browser is already
        # there. Miss: pull the browser + its system deps.
        run: |
          if [ "${{ steps.pw-cache.outputs.cache-hit }}" = "true" ]; then
            npx playwright install-deps chromium
          else
            npx playwright install --with-deps chromium
          fi

      - name: E2E tests
        run: npm run test:e2e

      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: app/playwright-report
          retention-days: 7

  deploy:
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: production
    concurrency:
      group: deploy-production
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      # Build on the runner (self-contained). Reusing the test job's build via an
      # artifact once shipped a manifest whose chunk files were missing and 500'd
      # prod, so we keep the deploy build independent and known-consistent.
      - name: Install deps & build
        run: npm ci && npm run build

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Ship to VPS
        env:
          SSH_TARGET: ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          rsync -az --delete -e ssh build "$SSH_TARGET:$DEPLOY_PATH/"
          rsync -az -e ssh package.json package-lock.json deploy scripts "$SSH_TARGET:$DEPLOY_PATH/"
          ssh "$SSH_TARGET" "cd '$DEPLOY_PATH' && bash deploy/backup.sh && npm ci --omit=dev && sudo systemctl restart foundry"
