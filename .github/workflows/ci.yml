name: CI

on:
  push:
    branches: [main]
  pull_request:

defaults:
  run:
    working-directory: app

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run check

      - name: Unit tests
        run: npm run test:unit

      - name: Build
        run: npm run build

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: E2E tests
        run: npm run test:e2e

      - uses: actions/upload-artifact@v7
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: app/playwright-report
          retention-days: 7

  # Continuous deployment: only a green `main` push reaches production.
  deploy:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    concurrency:
      group: production-deploy
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Ship to the VPS and restart
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: /opt/foundry
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts 2>/dev/null
          SSH="ssh -i $HOME/.ssh/deploy_key -o StrictHostKeyChecking=yes"
          # Code only — never touches data/ or .env on the server.
          rsync -az --delete -e "$SSH" build "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/"
          rsync -az -e "$SSH" package.json package-lock.json deploy scripts "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/"
          $SSH "$DEPLOY_USER@$DEPLOY_HOST" "cd $DEPLOY_PATH && npm ci --omit=dev && sudo systemctl restart foundry"
